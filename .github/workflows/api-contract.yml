name: API Contract

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/src/api/**"
      - ".github/workflows/api-contract.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/src/api/**"
      - ".github/workflows/api-contract.yml"

jobs:
  contract:
    name: OpenAPI Contract Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Go dependencies
        working-directory: backend
        run: go mod download

      - name: Install swag
        working-directory: backend
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate OpenAPI spec
        working-directory: backend
        run: swag init -g cmd/server/main.go -o docs --outputTypes yaml,json --quiet

      - name: Verify spec is committed
        working-directory: backend
        run: |
          if ! git diff --exit-code docs/; then
            echo "OpenAPI spec is out of date. Run 'make swag' locally and commit backend/docs/."
            git diff docs/
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate API contract
        working-directory: frontend
        run: npm run validate:api
