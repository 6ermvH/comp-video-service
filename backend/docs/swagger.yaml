basePath: /api
definitions:
  model.Admin:
    properties:
      created_at:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  model.CreateGroupRequest:
    properties:
      description:
        type: string
      name:
        type: string
      priority:
        type: integer
      target_votes_per_pair:
        type: integer
    required:
    - name
    type: object
  model.CreatePairRequest:
    properties:
      baseline_video_id:
        type: string
      candidate_video_id:
        type: string
      difficulty:
        type: string
      group_id:
        type: string
      is_attention_check:
        type: boolean
      notes:
        type: string
      pair_code:
        type: string
    required:
    - baseline_video_id
    - candidate_video_id
    - group_id
    type: object
  model.CreateStudyRequest:
    properties:
      confidence_enabled:
        type: boolean
      effect_type:
        type: string
      instructions_text:
        type: string
      max_tasks_per_participant:
        type: integer
      name:
        type: string
      reasons_enabled:
        type: boolean
      tie_option_enabled:
        type: boolean
    required:
    - effect_type
    - name
    type: object
  model.Group:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      priority:
        type: integer
      study_id:
        type: string
      target_votes_per_pair:
        type: integer
    type: object
  model.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.LoginResponse:
    properties:
      admin:
        $ref: '#/definitions/model.Admin'
      csrf_token:
        type: string
      token:
        type: string
    type: object
  model.Response:
    properties:
      choice:
        type: string
      confidence:
        type: integer
      created_at:
        type: string
      id:
        type: string
      pair_presentation_id:
        type: string
      participant_id:
        type: string
      reason_codes:
        items:
          type: string
        type: array
      replay_count:
        type: integer
      response_time_ms:
        type: integer
    type: object
  model.SourceItem:
    properties:
      created_at:
        type: string
      difficulty:
        type: string
      group_id:
        type: string
      id:
        type: string
      is_attention_check:
        type: boolean
      notes:
        type: string
      pair_code:
        type: string
      source_image_id:
        type: string
      study_id:
        type: string
    type: object
  model.StartSessionRequest:
    properties:
      browser:
        type: string
      device_type:
        type: string
      experience:
        type: string
      role:
        type: string
      study_id:
        type: string
    required:
    - study_id
    type: object
  model.Study:
    properties:
      confidence_enabled:
        type: boolean
      created_at:
        type: string
      effect_type:
        type: string
      id:
        type: string
      instructions_text:
        type: string
      max_tasks_per_participant:
        type: integer
      name:
        type: string
      reasons_enabled:
        type: boolean
      status:
        type: string
      tie_option_enabled:
        type: boolean
    type: object
  model.TaskPayload:
    properties:
      is_attention_check:
        type: boolean
      is_practice:
        type: boolean
      left:
        $ref: '#/definitions/model.Video'
      presentation_id:
        type: string
      right:
        $ref: '#/definitions/model.Video'
      source_item_id:
        type: string
      task_order:
        type: integer
    type: object
  model.TaskResponseRequest:
    properties:
      choice:
        type: string
      confidence:
        type: integer
      reason_codes:
        items:
          type: string
        type: array
      replay_count:
        type: integer
      response_time_ms:
        type: integer
    required:
    - choice
    type: object
  model.UpdateStudyRequest:
    properties:
      confidence_enabled:
        type: boolean
      effect_type:
        type: string
      instructions_text:
        type: string
      max_tasks_per_participant:
        type: integer
      name:
        type: string
      reasons_enabled:
        type: boolean
      status:
        type: string
      tie_option_enabled:
        type: boolean
    type: object
  model.Video:
    properties:
      checksum:
        type: string
      codec:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration_ms:
        type: integer
      fps:
        type: number
      height:
        type: integer
      id:
        type: string
      method_type:
        type: string
      presigned_url:
        type: string
      s3_key:
        type: string
      source_item_id:
        type: string
      status:
        $ref: '#/definitions/model.VideoStatus'
      title:
        type: string
      updated_at:
        type: string
      width:
        type: integer
    type: object
  model.VideoStatus:
    enum:
    - active
    - archived
    type: string
    x-enum-varnames:
    - VideoStatusActive
    - VideoStatusArchived
  service.AnalyticsOverview:
    properties:
      candidate_win_rate:
        type: number
      completion_rate:
        type: number
      effects:
        items:
          $ref: '#/definitions/service.EffectAnalytics'
        type: array
      groups:
        items:
          $ref: '#/definitions/service.GroupAnalytics'
        type: array
      tie_rate:
        type: number
      total_participants:
        type: integer
      total_responses:
        type: integer
      total_source_items:
        type: integer
    type: object
  service.EffectAnalytics:
    properties:
      candidate_win_rate:
        type: number
      effect_type:
        type: string
      responses:
        type: integer
      tie_rate:
        type: number
    type: object
  service.GroupAnalytics:
    properties:
      group_id:
        type: string
      group_name:
        type: string
      responses:
        type: integer
      tie_rate:
        type: number
    type: object
  service.PairStat:
    properties:
      baseline_wins:
        type: integer
      candidate_win_rate:
        type: number
      candidate_wins:
        type: integer
      difficulty:
        type: string
      group_name:
        type: string
      pair_code:
        type: string
      source_item_id:
        type: string
      tie_count:
        type: integer
      total_responses:
        type: integer
    type: object
  service.QCReport:
    properties:
      fast_response_threshold_ms:
        type: integer
      fast_responses:
        type: integer
      straight_lining_profiles:
        type: integer
      total_responses:
        type: integer
    type: object
  service.SessionCompleteResult:
    properties:
      completion_code:
        type: string
    type: object
  service.SessionStartMeta:
    properties:
      confidence_enabled:
        type: boolean
      effect_type:
        type: string
      instructions_text:
        type: string
      max_tasks_per_participant:
        type: integer
      reasons_enabled:
        type: boolean
      study_id:
        type: string
      study_name:
        type: string
      tie_option_enabled:
        type: boolean
    type: object
  service.SessionStartResult:
    properties:
      assigned:
        type: integer
      first_task:
        $ref: '#/definitions/model.TaskPayload'
      meta:
        $ref: '#/definitions/service.SessionStartMeta'
      session_token:
        type: string
    type: object
  service.StudyAnalytics:
    properties:
      groups:
        items:
          $ref: '#/definitions/service.GroupAnalytics'
        type: array
      left_win_rate:
        type: number
      left_wins:
        type: integer
      right_win_rate:
        type: number
      right_wins:
        type: integer
      study_id:
        type: string
      tie_count:
        type: integer
      tie_rate:
        type: number
      total:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: Controlled pairwise video comparison platform for flooding/explosion
    research.
  title: Video Comparison Service API
  version: "1.0"
paths:
  /admin/analytics/overview:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.AnalyticsOverview'
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Get analytics overview
      tags:
      - admin
  /admin/analytics/qc:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.QCReport'
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Get QC report
      tags:
      - admin
  /admin/analytics/study/{id}:
    get:
      parameters:
      - description: Study ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.StudyAnalytics'
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Get per-study analytics
      tags:
      - admin
  /admin/analytics/study/{id}/pairs:
    get:
      parameters:
      - description: Study ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.PairStat'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get per-pair analytics for a study
      tags:
      - admin
  /admin/assets:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all video assets
      tags:
      - admin
  /admin/assets/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: MP4 video file
        in: formData
        name: file
        required: true
        type: file
      - description: baseline or candidate
        in: formData
        name: method_type
        required: true
        type: string
      - description: Source item UUID to link
        in: formData
        name: source_item_id
        type: string
      - description: Video title
        in: formData
        name: title
        type: string
      - description: Video description
        in: formData
        name: description
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Video'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Upload a video asset
      tags:
      - admin
  /admin/export/csv:
    get:
      produces:
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Export responses as CSV
      tags:
      - admin
  /admin/export/json:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties:
                type: string
              type: object
            type: array
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Export responses as JSON
      tags:
      - admin
  /admin/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Admin login
      tags:
      - auth
  /admin/source-items:
    get:
      parameters:
      - description: Filter by study UUID
        in: query
        name: study_id
        type: string
      - description: Filter by group UUID
        in: query
        name: group_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: List source items (pairs)
      tags:
      - admin
  /admin/studies:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: List all studies
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: Study data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateStudyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Study'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Create a new study
      tags:
      - admin
  /admin/studies/{id}:
    patch:
      consumes:
      - application/json
      description: Update study status and/or fields
      parameters:
      - description: Study ID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateStudyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Study'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Update study
      tags:
      - admin
  /admin/studies/{id}/groups:
    get:
      parameters:
      - description: Study ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: List groups for a study
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: Study ID
        in: path
        name: id
        required: true
        type: string
      - description: Group data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Group'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Create a group within a study
      tags:
      - admin
  /admin/studies/{id}/import:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Study ID
        in: path
        name: id
        required: true
        type: string
      - description: CSV file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Import source items from CSV
      tags:
      - admin
  /admin/studies/{id}/pairs:
    post:
      consumes:
      - application/json
      parameters:
      - description: Study ID
        in: path
        name: id
        required: true
        type: string
      - description: Pair payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreatePairRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.SourceItem'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - CSRFToken: []
      summary: Create a source item pair from two existing video assets
      tags:
      - admin
  /session/{token}/complete:
    post:
      parameters:
      - description: Session token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.SessionCompleteResult'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Complete participant session
      tags:
      - session
  /session/{token}/next-task:
    get:
      parameters:
      - description: Session token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.TaskPayload'
        "204":
          description: No more tasks
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get next task for session
      tags:
      - session
  /session/start:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.StartSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.SessionStartResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start participant session
      tags:
      - session
  /task/{id}/event:
    post:
      consumes:
      - application/json
      parameters:
      - description: Pair presentation ID
        in: path
        name: id
        required: true
        type: string
      - description: Event data
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Log interaction event
      tags:
      - task
  /task/{id}/response:
    post:
      consumes:
      - application/json
      parameters:
      - description: Pair presentation ID
        in: path
        name: id
        required: true
        type: string
      - description: Response data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.TaskResponseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Submit response for a task
      tags:
      - task
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
  CSRFToken:
    in: header
    name: X-CSRF-Token
    type: apiKey
swagger: "2.0"
